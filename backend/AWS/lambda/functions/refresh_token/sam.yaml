AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  LivewellCoreLayerVersion:
    Type: Number
    Description: Livewell Core Layer Version
    Default: 35
  MessageLayerVersion:
    Type: Number
    Description: Message Layer Version
    Default: 10
  AWSLayerVersion:
    Type: Number
    Description: AWS Layer Version
    Default: 35
  ExistingApiId:
    Type: String
    Description: Existing REST API ID
    Default: 7xhw2qub6l
  ExistingApiRootResourceId:
    Type: String
    Description: Root Resource ID of existing API
    Default: mvl7kjxoi2

Globals:
  Function:
    Timeout: 30
    Runtime: python3.9

Resources:
  # API Gateway Resources
  RefreshTokenResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ExistingApiId
      ParentId: !Ref ExistingApiRootResourceId
      PathPart: refresh-token

  RefreshTokenMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref RefreshTokenResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RefreshTokenFunction.Arn}/invocations

  RefreshTokenOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref RefreshTokenResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  RefreshTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: refresh-token
      CodeUri: .
      Handler: function.lambda_handler
      Runtime: python3.9
      Timeout: 30
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:livewell-core-layer:${LivewellCoreLayerVersion}
        - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:aws-layer:${AWSLayerVersion}
        - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:message-layer:${MessageLayerVersion}


  RefreshTokenPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RefreshTokenFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ExistingApiId}/*/*

Outputs:
  RefreshTokenApi:
    Description: API Gateway endpoint URL for Refresh Token function
    Value: !Sub https://${ExistingApiId}.execute-api.${AWS::Region}.amazonaws.com/Prod/refresh-token
  LambdaFunctionArn:
    Description: Lambda Function ARN for manual API Gateway integration
    Value: !GetAtt RefreshTokenFunction.Arn