AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  LivewellCoreLayerVersion:
    Type: Number
    Default: 99
  MessageLayerVersion:
    Type: Number
    Default: 10

  ExistingApiId:
    Type: String
    Default: 7xhw2qub6l
  ExistingRootResourceId:
    Type: String
    Default: mvl7kjxoi2

Resources:
  RemoveChatHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: remove-chat-history
      CodeUri: .
      Handler: function.lambda_handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:livewell-core-layer:${LivewellCoreLayerVersion}"
        - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:message-layer:${MessageLayerVersion}"
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: livewell
          S3_BUCKET_NAME: livewell-chathistory
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: livewell
        - S3CrudPolicy:
            BucketName: livewell-chathistory


  RemoveChatHistoryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ExistingApiId
      ParentId: !Ref ExistingRootResourceId
      PathPart: remove-chat-history

  DeleteMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref RemoveChatHistoryResource
      HttpMethod: DELETE
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: c6djkx
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RemoveChatHistoryFunction.Arn}/invocations

  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref RemoveChatHistoryResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RemoveChatHistoryFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ExistingApiId}/*/*

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - DeleteMethod
      - OptionsMethod
    Properties:
      RestApiId: !Ref ExistingApiId
      StageName: prod
      Description: Deploy remove-chat-history methods

Outputs:
  RemoveChatHistoryFunction:
    Description: "Remove Chat History Lambda Function ARN"
    Value: !GetAtt RemoveChatHistoryFunction.Arn