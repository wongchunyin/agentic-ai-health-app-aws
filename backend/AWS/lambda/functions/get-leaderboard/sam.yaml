AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  AWSLayerVersion:
    Type: Number
    Description: AWS Layer Version
    Default: 38
  MessageLayerVersion:
    Type: Number
    Description: Message Layer Version
    Default: 10
  ExistingApiId:
    Type: String
    Description: Existing REST API ID
    Default: 7xhw2qub6l
  ExistingApiRootResourceId:
    Type: String
    Description: Root Resource ID of existing API
    Default: mvl7kjxoi2

Globals:
  Function:
    Timeout: 30
    Runtime: python3.11

Resources:
  LeaderboardResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ExistingApiId
      ParentId: !Ref ExistingApiRootResourceId
      PathPart: leaderboard

  LeaderboardOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref LeaderboardResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: '{}'
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true
          ResponseModels:
            application/json: !Ref AWS::NoValue

  GetLeaderboardMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref LeaderboardResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: c6djkx
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetLeaderboardFunction.Arn}/invocations

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-leaderboard
      CodeUri: .
      Handler: function.lambda_handler
      Runtime: python3.11
      Timeout: 30
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:aws-layer:${AWSLayerVersion}
        - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:message-layer:${MessageLayerVersion}
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: livewell
      Policies:
        - DynamoDBReadPolicy:
            TableName: livewell

  GetLeaderboardPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetLeaderboardFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ExistingApiId}/*/GET/leaderboard

Outputs:
  GetLeaderboardApi:
    Description: API Gateway endpoint URL for Get Leaderboard function
    Value: !Sub https://${ExistingApiId}.execute-api.${AWS::Region}.amazonaws.com/Prod/leaderboard
  LambdaFunctionArn:
    Description: Lambda Function ARN for manual API Gateway integration
    Value: !GetAtt GetLeaderboardFunction.Arn