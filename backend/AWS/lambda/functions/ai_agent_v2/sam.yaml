AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Agent v2 Lambda Function

Parameters:
  GeminiApiKey:
    Type: String
    Description: Google Gemini API Key
    Default: "PLACEHOLDER"
    NoEcho: true
  AIAgentLayerVersion:
    Type: Number
    Description: Version of the AI Agent Layer to use
    Default: 45
  MessageLayerVersion:
    Type: Number
    Description: Message Layer Version
    Default: 10

  AWSLayerVersion:
    Type: Number
    Description: AWS Layer Version (includes config)
    Default: 37
  ExistingApiId:
    Type: String
    Description: Existing REST API ID
    Default: 7xhw2qub6l
  ExistingApiRootResourceId:
    Type: String
    Description: Root Resource ID of existing API
    Default: mvl7kjxoi2

Resources:
  # API Gateway Resources
  AiV2Resource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ExistingApiId
      ParentId: !Ref ExistingApiRootResourceId
      PathPart: ai-v2

  AiV2Method:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref AiV2Resource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: c6djkx
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AIAgentV2Function.Arn}/invocations

  AiV2OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref AiV2Resource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  AIAgentV2Function:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ai-agent-v2
      CodeUri: .
      Handler: function.lambda_handler
      Runtime: python3.11
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          GEMINI_API_KEY: !Ref GeminiApiKey
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:ai-agent-layer:${AIAgentLayerVersion}"
        - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:aws-layer:${AWSLayerVersion}"
        - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:message-layer:${MessageLayerVersion}"
      Policies:
        - S3ReadPolicy:
            BucketName: livewell-profiles
        - S3WritePolicy:
            BucketName: livewell-profiles
        - S3ReadPolicy:
            BucketName: livewell-plans
        - S3WritePolicy:
            BucketName: livewell-plans
        - S3ReadPolicy:
            BucketName: livewell-chathistory
        - S3WritePolicy:
            BucketName: livewell-chathistory
        - DynamoDBCrudPolicy:
            TableName: livewell

  AIAgentV2Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AIAgentV2Function
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ExistingApiId}/*/*

Outputs:
  AIAgentV2ApiUrl:
    Description: "AI Agent v2 API Gateway endpoint URL"
    Value: !Sub "https://${ExistingApiId}.execute-api.${AWS::Region}.amazonaws.com/Prod/ai-v2"
  AIAgentV2FunctionArn:
    Description: ARN of the AI Agent v2 Function
    Value: !GetAtt AIAgentV2Function.Arn