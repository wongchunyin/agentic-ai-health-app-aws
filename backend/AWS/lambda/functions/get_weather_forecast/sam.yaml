AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  AIAgentLayerVersion:
    Type: Number
    Default: 45
    Description: Version of the ai-agent layer
  MessageLayerVersion:
    Type: Number
    Default: 10
    Description: Version of the message layer
  ExistingApiId:
    Type: String
    Description: Existing REST API ID
    Default: 7xhw2qub6l
  ExistingApiRootResourceId:
    Type: String
    Description: Root Resource ID of existing API
    Default: mvl7kjxoi2

Resources:
  WeatherResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ExistingApiId
      ParentId: !Ref ExistingApiRootResourceId
      PathPart: weather

  WeatherForecastResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ExistingApiId
      ParentId: !Ref WeatherResource
      PathPart: forecast

  WeatherForecastGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref WeatherForecastResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: c6djkx
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetWeatherForecastFunction.Arn}/invocations

  WeatherForecastOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ExistingApiId
      ResourceId: !Ref WeatherForecastResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  GetWeatherForecastFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-weather-forecast
      Runtime: python3.11
      Handler: function.lambda_handler
      CodeUri: .
      Timeout: 30
      MemorySize: 128
      
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:ai-agent-layer:${AIAgentLayerVersion}"
        - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:message-layer:${MessageLayerVersion}"
      
      Policies:
        - AWSLambdaBasicExecutionRole

  GetWeatherForecastPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetWeatherForecastFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ExistingApiId}/*/*

Outputs:
  GetWeatherForecastFunctionArn:
    Description: "Get Weather Forecast Function ARN"
    Value: !GetAtt GetWeatherForecastFunction.Arn
  GetWeatherForecastApiUrl:
    Description: "Get Weather Forecast API Gateway endpoint URL"
    Value: !Sub "https://${ExistingApiId}.execute-api.${AWS::Region}.amazonaws.com/Prod/weather/forecast"